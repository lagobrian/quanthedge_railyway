version: '3.8'

services:
  db:
    image: postgres:17
    container_name: quanthedge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quanthedge
      POSTGRES_USER: quanthedge
      POSTGRES_PASSWORD: quanthedge_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quanthedge_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: lagobrian@outlook.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: quanthedge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
