databases:
  - name: quanthedge-db
    plan: free
    databaseName: quanthedge
    user: quanthedge

services:
  # Django Backend
  - type: web
    name: quanthedge-api
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    preDeployCommand: cd backend && python manage.py migrate
    startCommand: cd backend && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: quanthedge-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: email-smtp.us-east-1.amazonaws.com
      - key: EMAIL_PORT
        value: "587"
      - key: SES_SMTP_USER
        sync: false
      - key: SES_SMTP_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: LagoBrian@outlook.com
      - key: SITE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  # # Cron Job: Daily data pipeline + thumbnail generation
