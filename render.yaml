  #       fromDatabase:
  #         name: quanthedge-db
  #         property: port
  #     - key: PYTHON_VERSION
  #       value: "3.11.0"

  # Next.js Frontend
  - type: web
    name: quanthedge-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
