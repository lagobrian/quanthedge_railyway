<p><em>“In times of danger don’t freeze, time to be a G” </em>— Tupac Shakur, <em>Until the End of Time</em></p><div><hr></div><p>Tranquility is often used as a synonym for calmness but they are not the same. Tranquility is about a lack of mental and emotional disturbance, while calmness implies a lack of anxiety or anger. </p><p></p>
